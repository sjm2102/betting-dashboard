name: Update NBA Roster Stats

on:
  schedule:
    # Runs every day at 8:00 AM ET (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update-roster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run roster updater
        run: node update_roster.js

      - name: Check if roster.json changed
        id: diff
        run: |
          git diff --quiet roster.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated roster.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roster.json
          git commit -m "Auto-update roster.json — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "roster.json is already up to date — no commit needed."
