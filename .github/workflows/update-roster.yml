name: Update NBA Roster Stats

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug secret exists
        run: |
          if [ -z "${{ secrets.BALLDONTLIE_API_KEY }}" ]; then
            echo "❌ Secret BALLDONTLIE_API_KEY is EMPTY or NOT SET"
            exit 1
          else
            echo "✅ Secret exists, length: ${#BALLDONTLIE_API_KEY}"
          fi
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}

      - name: Run roster updater
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: node update_roster.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet roster.json || (git add roster.json && git commit -m "Auto-update roster.json $(date -u '+%Y-%m-%d')" && git push)
