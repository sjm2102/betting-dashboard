name: Update NBA Roster Stats

on:
  schedule:
    - cron: '0 13 * * *'  # Every day at 8AM ET
  workflow_dispatch:

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run roster updater
        run: node update_roster.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet roster.json || (git add roster.json && git commit -m "Auto-update roster.json $(date -u '+%Y-%m-%d')" && git push)
